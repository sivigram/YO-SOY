<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YO SOY BUSINESS CARD</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #73535A;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      text-align: center;
      background: #1b1b1b;
      border-radius: 28px;
      padding: 36px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
    }

    .logo {
      width: 120px;
      margin-bottom: 28px;
    }

    h1 {
      font-size: 30px;
      margin: 0 0 28px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .btn {
      display: block;
      text-decoration: none;
      color: white;
      background: #2b2b2b;
      padding: 16px;
      margin: 12px 0;
      border-radius: 16px;
      font-size: 17px;
      border: 1px solid #333;
    }

    .btn:active {
      background: #444;
    }

    .primary {
      background: white;
      color: black;
      font-weight: bold;
    }

    .qr {
      margin-top: 28px;
      width: 180px;
      height: 180px;
      background: white;
      padding: 12px;
      border-radius: 18px;
    }

    .small {
      color: #aaa;
      font-size: 13px;
      margin-top: 14px;
    }
    
    .billing{
    margin-top:40px;
    border-top:1px solid #333;
    padding-top:25px;
}

.billing h3{
    font-size:14px;
    color:#999;
    margin-bottom:15px;
    font-weight:normal;
    text-transform:uppercase;
    letter-spacing:1px;
}

.billing a{
    display:block;
    text-decoration:none;
    color:#bbb;
    font-size:14px;
    padding:8px 0;
}
  </style>
</head>

<body>
  <main class="card">

    <!-- LOGO -->
    <img src="logo colore.svg" alt="Logo" class="logo">

    <!-- NOME -->
    <h1>YO SOY WEAR</h1>
    <h2>ALESSIA ACTIS GROSSO</h2>
    

    <!-- CONTATTI -->
    <a class="btn primary" href="tel:+39 339 472 2482">+39 339 472 2482</a>

      WhatsApp
    </a>

    <a class="btn" href="mailto:yosoywear.info@gmail.com">

    </a>

    <a class="btn" href="https://www.yosoywear.com" target="_blank">
      www.yosoywear.com
    </a>

<div class="billing">

    <h3>Dati di fatturazione</h3>

    <a href="#">ALESSIA ACTIS GROSSO</a>

</div>
  <img

    src="https://api.qrserver.com/v1/create-qr-code/?size=350x350&data=https://yo-soy.onrender.com"

  </main>
